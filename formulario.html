<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario | GN</title>
    <style>
        body{
           font-family: Arial, Helvetica, sans-serif;
           background-image: linear-gradient(to right, rgb(124, 21, 149), rgb(86, 27, 174));
        }
        .box{
           color: white;
           position: absolute; 
           top: 50%;
           left: 50%;
           transform: translate(-50%, -50%);
           background-color: rgba(0, 0, 0, 0.6);
           padding: 15px; 
           border-radius: 15px;
           width: 300px;
           max-width: 90%;
           
        }
        fieldset{
            border: 3px solid purple;
        }
        legend{ 
            border: 1px solid purple;
            padding: 10px;
            text-align: center;
            background-color: purple;
            border-radius: 8px; 
        }
        .inputBox{
            position: relative;            
        }
        .inputUser{
            background: none;
            border: none;
            border-bottom: 1px solid white; 
            outline: none; 
            color: white; 
            font-size: 15px;
            width: 100%; 
            letter-spacing: 1px;
        } 
        .LabelInput{
            position: absolute;
            top: 0px;
            left: 0px;
            pointer-events: none;
            transition: .5s;
        }        
        .inputUser:focus ~.LabelInput,
        .inputUser:valid ~.LabelInput{
            top: -20px;
            font-size: 12px;
            color: #9D00FF;
        }
        #data_nascimento{
            border:none;
            padding: 8px; 
            border-radius: 10px;
            outline: none;      
            font-size: 15px;      
        }
        #submit{
            background-image: linear-gradient(to right, rgb(124, 21, 149), rgb(86, 27, 174));
            width: 100%;
            border: none; 
            padding: 15px;
            color: white; 
            font-size: 15px; 
            cursor: pointer;
            border-radius: 10px;                        
        }
        #submit:hover{
            background-image: linear-gradient(to right, rgb(88, 9, 108), rgb(66, 10, 150)); 
        }

    </style>
</head>
<body>
    <div class="box">
      <form action="processa.php" method="POST">
        <fieldset>
            <legend><b>Formulário de Clientes</b></legend>
            <br><br>
            <div class="inputBox">
                <input type="text" name="nome" id="nome" class="inputUser" required>
                <label for="nome" class="LabelInput">Nome Completo</label>
            </div>
            <br><br>
             <div class="inputBox">
                <input type="email" name="email" id="email" class="inputUser" required>
                <label for="email class="LabelInput">E-mail</label>
            </div>
            <br><br>
             <div class="inputBox">
                <input type="tel" name="telefone" pattern="[0-9]{10,11}" name="telefone" id="telefone" class="inputUser" required>
                <label for="telefone" class="LabelInput">Telefone</label>
            </div>
            <br>

            <p>Sexo:</p>
            <input type="radio" id="feminino" name="genero" value="feminino" required>
            <label for="feminino" >Feminino</label><br>
            <input type="radio" id="masculino" name="genero" value="masculino" required>
            <label for="masculino">Masculino</label><br>
            <input type="radio" id="outro" name="genero" value="outro" required>
            <label for="outro">Outro</label><br><br>
            
            
            <label for="data_nascimento"><b>Data de Nascimento</b></label><br>
            <input type="date" name="data_nascimento" id="data_nascimento" required>
           
               <br><br>
               <div class="inputBox">
            <input type="text" name="cidade" id="cidade" class="inputUser" required>
                <label for="cidade" class="LabelInput">Cidade</label>
            </div>
            <br><br>
            <div class="inputBox">
            <input type="text" name="estado" id="estado" class="inputUser" required>
                <label for="estado" class="LabelInput">Estado</label>
            </div>
            <br><br>
            <div class="inputBox">
            <input type="text" name="endereco" id="endereco" class="inputUser" required>
                <label for="endereco" class="LabelInput">Endereço</label>
            </div>
            <br>
                <input type="submit" name="submit" id="submit">
        </fieldset>
       </form>
    </div>
</body>
</html>
