<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Define o conjunto de caracteres -->
    <meta charset="UTF-8">

    <!-- Responsividade para dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da página -->
    <title>Formulario | GN</title>

    <style>
        /* Estilo geral da página */
        body{
           font-family: Arial, Helvetica, sans-serif;
           /* Fundo com gradiente */
           background-image: linear-gradient(to right, rgb(124, 21, 149), rgb(86, 27, 174));
        }

        /* Caixa central do formulário */
        .box{
           color: white;
           position: absolute; 
           top: 50%;
           left: 50%;
           transform: translate(-50%, -50%); /* Centraliza */
           background-color: rgba(0, 0, 0, 0.6);
           padding: 15px; 
           border-radius: 15px;
           width: 300px;
           max-width: 90%;
        }

        /* Borda do agrupamento */
        fieldset{
            border: 3px solid purple;
        }

        /* Título do formulário */
        legend{ 
            border: 1px solid purple;
            padding: 10px;
            text-align: center;
            background-color: purple;
            border-radius: 8px; 
        }

        /* Container de inputs */
        .inputBox{
            position: relative;            
        }

        /* Campos de entrada */
        .inputUser{
            background: none;
            border: none;
            border-bottom: 1px solid white; 
            outline: none; 
            color: white; 
            font-size: 15px;
            width: 100%; 
            letter-spacing: 1px;
        } 

        /* Labels dos inputs */
        .LabelInput{
            position: absolute;
            top: 0px;
            left: 0px;
            pointer-events: none;
            transition: .5s;
        }

        /* Efeito quando o input está ativo ou preenchido */
        .inputUser:focus ~.LabelInput,
        .inputUser:valid ~.LabelInput{
            top: -20px;
            font-size: 12px;
            color: #9D00FF;
        }

        /* Campo de data */
        #data_nascimento{
            border:none;
            padding: 8px; 
            border-radius: 10px;
            outline: none;      
            font-size: 15px;      
        }

        /* Botão de envio */
        #submit{
            background-image: linear-gradient(to right, rgb(124, 21, 149), rgb(86, 27, 174));
            width: 100%;
            border: none; 
            padding: 15px;
            color: white; 
            font-size: 15px; 
            cursor: pointer;
            border-radius: 10px;                        
        }

        /* Efeito hover do botão */
        #submit:hover{
            background-image: linear-gradient(to right, rgb(88, 9, 108), rgb(66, 10, 150)); 
        }
    </style>
</head>

<body>

    <!-- Caixa principal do formulário -->
    <div class="box">

      <!-- Formulário que envia dados para processa.php via POST -->
      <form action="processa.php" method="POST">

        <fieldset>
            <!-- Título do formulário -->
            <legend><b>Formulário de Clientes</b></legend>

            <br><br>

            <!-- Campo Nome -->
            <div class="inputBox">
                <input type="text" name="nome" id="nome" class="inputUser" required>
                <label for="nome" class="LabelInput">Nome Completo</label>
            </div>

            <br><br>

            <!-- Campo Email -->
            <div class="inputBox">
                <input type="email" name="email" id="email" class="inputUser" required>
                <label for="email" class="LabelInput">E-mail</label>
            </div>

            <br><br>

            <!-- Campo Telefone -->
            <div class="inputBox">
                <!-- pattern limita para 10 ou 11 números -->
                <input type="tel" name="telefone" pattern="[0-9]{10,11}" id="telefone" class="inputUser" required>
                <label for="telefone" class="LabelInput">Telefone</label>
            </div>

            <br>

            <!-- Seleção de gênero -->
            <p>Sexo:</p>

            <input type="radio" id="feminino" name="genero" value="feminino" required>
            <label for="feminino">Feminino</label><br>

            <input type="radio" id="masculino" name="genero" value="masculino" required>
            <label for="masculino">Masculino</label><br>

            <input type="radio" id="outro" name="genero" value="outro" required>
            <label for="outro">Outro</label><br><br>

            <!-- Data de nascimento -->
            <label for="data_nascimento"><b>Data de Nascimento</b></label><br>
            <input type="date" name="data_nascimento" id="data_nascimento" required>

            <br><br>

            <!-- Campo Cidade -->
            <div class="inputBox">
                <input type="text" name="cidade" id="cidade" class="inputUser" required>
                <label for="cidade" class="LabelInput">Cidade</label>
            </div>

            <br><br>

            <!-- Campo Estado -->
            <div class="inputBox">
                <input type="text" name="estado" id="estado" class="inputUser" required>
                <label for="estado" class="LabelInput">Estado</label>
            </div>

            <br><br>

            <!-- Campo Endereço -->
            <div class="inputBox">
                <input type="text" name="endereco" id="endereco" class="inputUser" required>
                <label for="endereco" class="LabelInput">Endereço</label>
            </div>

            <br>

            <!-- Botão de envio -->
            <input type="submit" name="submit" id="submit">

        </fieldset>
       </form>
    </div>

</body>
</html>
